<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Eye Pro Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <style>
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px;
            border-radius: 50%; background: #06b6d4; cursor: pointer; margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 6px; background: #333; border-radius: 4px;
        }
    </style>
</head>
<body class="bg-black text-white flex flex-col h-screen overflow-hidden font-sans">
    
    <header class="p-4 border-b border-neutral-800 bg-neutral-900 flex justify-between items-center z-10">
        <h1 class="font-bold text-cyan-500">PRO EYE EDITOR</h1>
        <span id="saveStatus" class="text-[10px] text-green-400 opacity-0 transition-opacity">Updating...</span>
    </header>

    <div id="canvas-container" class="relative w-full h-[50vh] bg-black">
        <div id="loader" class="absolute inset-0 flex items-center justify-center bg-black z-20 text-cyan-400 text-sm animate-pulse">
            Loading 3D Engine...
        </div>
    </div>

    <div class="p-5 bg-neutral-900 rounded-t-3xl border-t border-neutral-800 flex-1 shadow-2xl z-10 overflow-y-auto">
        
        <input type="file" id="imageInput" accept="image/*" class="hidden">
        <button onclick="document.getElementById('imageInput').click()" class="w-full py-3 mb-5 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-bold active:scale-95 transition-all uppercase tracking-wider text-sm shadow-lg shadow-cyan-500/20">
            📂 Upload / Capture Eye
        </button>

        <div class="space-y-4">
            <h2 class="text-xs font-bold text-neutral-500 uppercase tracking-widest border-b border-neutral-800 pb-2">Enhancement Controls</h2>
            
            <div>
                <div class="flex justify-between text-[11px] text-neutral-400 mb-1"><span>Contrast (Iris Details)</span><span id="cVal">120%</span></div>
                <input type="range" id="contrast" min="50" max="200" value="120" class="w-full appearance-none bg-transparent">
            </div>

            <div>
                <div class="flex justify-between text-[11px] text-neutral-400 mb-1"><span>Color Depth</span><span id="sVal">100%</span></div>
                <input type="range" id="saturation" min="0" max="200" value="100" class="w-full appearance-none bg-transparent">
            </div>

            <div>
                <div class="flex justify-between text-[11px] text-cyan-400 mb-1 font-bold"><span>Pupil & Cornea Focus</span><span id="pVal">50%</span></div>
                <input type="range" id="pupilFocus" min="0" max="100" value="50" class="w-full appearance-none bg-transparent">
            </div>
            
            <p class="text-[10px] text-neutral-600 leading-tight text-center mt-2">
                *Images are automatically compressed to ensure smooth 3D rendering.
            </p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, eyeMesh;
        let baseImage = null; 
        const filterCanvas = document.createElement('canvas');
        const ctx = filterCanvas.getContext('2d', { willReadFrequently: true });
        let filteredTexture = null;

        let brightness = 100, contrast = 120, saturation = 100, pupilFocus = 50;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 7;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 2.0));
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enablePan = false; controls.enableDamping = true;

            document.getElementById('loader').style.display = 'none';
            loadDefaultImage();
            animate();
        }

        // Auto-Compressor keeps the app from crashing on heavy gallery uploads
        function processImageFile(file) {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').innerText = "Processing Image...";
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const maxSize = 1024;
                    let w = img.width, h = img.height;
                    if (w > maxSize || h > maxSize) {
                        const ratio = Math.min(maxSize / w, maxSize / h);
                        w *= ratio; h *= ratio;
                    }
                    filterCanvas.width = w; filterCanvas.height = h;
                    baseImage = img;
                    
                    document.getElementById('loader').style.display = 'none';
                    applyFilters(); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function applyFilters() {
            if (!baseImage) return;
            const w = filterCanvas.width; const h = filterCanvas.height;
            
            ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
            ctx.drawImage(baseImage, 0, 0, w, h);
            
            ctx.filter = 'none'; 
            const cx = w/2, cy = h/2, radius = Math.min(w, h)/2;
            
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
            gradient.addColorStop(0, `rgba(0, 0, 0, ${pupilFocus/100})`);
            gradient.addColorStop(0.3, `rgba(0, 0, 0, ${(pupilFocus/100) * 0.2})`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);

            if (!filteredTexture) {
                filteredTexture = new THREE.CanvasTexture(filterCanvas);
                filteredTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
                filteredTexture.colorSpace = THREE.SRGBColorSpace;
                filteredTexture.minFilter = THREE.LinearFilter;
                create3DMesh(filteredTexture);
            } else {
                filteredTexture.needsUpdate = true; 
            }
        }

        function create3DMesh(tex) {
            if (eyeMesh) scene.remove(eyeMesh);
            const geo = new THREE.PlaneGeometry(5, 5, 256, 256);
            const pos = geo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i);
                pos.setZ(i, 0.7 * Math.exp(-(x*x + y*y) / 4.0)); 
            }
            geo.computeVertexNormals();
            const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 1.0, side: THREE.DoubleSide });
            eyeMesh = new THREE.Mesh(geo, mat);
            scene.add(eyeMesh);
        }

        function loadDefaultImage() {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                filterCanvas.width = 1024; filterCanvas.height = 1024;
                baseImage = img;
                applyFilters();
            };
            img.src = 'https://images.unsplash.com/photo-1542224566-6e85f2e6772f?q=80&w=1024';
        }

        const triggerUpdate = () => {
            const s = document.getElementById('saveStatus');
            s.style.opacity = 1; setTimeout(()=> s.style.opacity=0, 300);
            applyFilters();
        };

        document.getElementById('contrast').addEventListener('input', (e) => {
            contrast = e.target.value; document.getElementById('cVal').innerText = contrast+'%'; triggerUpdate();
        });
        document.getElementById('saturation').addEventListener('input', (e) => {
            saturation = e.target.value; document.getElementById('sVal').innerText = saturation+'%'; triggerUpdate();
        });
        document.getElementById('pupilFocus').addEventListener('input', (e) => {
            pupilFocus = e.target.value; document.getElementById('pVal').innerText = pupilFocus+'%'; triggerUpdate();
        });

        document.getElementById('imageInput').addEventListener('change', (e) => {
            if (e.target.files[0]) processImageFile(e.target.files[0]);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (eyeMesh) eyeMesh.rotation.y = Math.sin(Date.now() * 0.0008) * 0.03;
            controls.update();
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
