<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Human Eye Forensic Analyzer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <style>
        .touch-scroll { -webkit-overflow-scrolling: touch; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px;
            border-radius: 50%; background: #06b6d4; cursor: pointer; margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 6px; background: #333; border-radius: 4px;
        }
    </style>
</head>
<body class="bg-black text-white flex flex-col h-screen overflow-hidden font-sans">
    
    <header class="p-4 border-b border-neutral-800 bg-neutral-900 flex justify-between items-center z-10">
        <h1 class="font-bold text-cyan-500 uppercase tracking-tighter">AI Eye Forensic Analyzer Pro</h1>
        <span id="saveStatus" class="text-[10px] text-green-400 opacity-0 transition-opacity">Updating...</span>
    </header>

    <div id="canvas-container" class="relative w-full h-[50vh] bg-white">
        <div id="loader" class="absolute inset-0 flex items-center justify-center bg-white z-20 text-cyan-600 font-bold text-sm animate-pulse uppercase tracking-widest">
            Scanning Tissue Data... 👁️
        </div>
    </div>

    <div class="p-5 bg-neutral-900 rounded-t-3xl border-t border-neutral-800 flex-1 shadow-2xl z-10 overflow-y-auto touch-scroll pb-10">
        
        <input type="file" id="imageInput" accept=".jpg, .jpeg, .png" class="hidden">
        
        <button onclick="document.getElementById('imageInput').click()" class="w-full py-3 mb-5 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-bold active:scale-95 transition-all uppercase tracking-wider text-sm shadow-lg shadow-cyan-500/20">
            📂 Upload / Capture Iris
        </button>

        <div class="space-y-4">
            <h2 class="text-xs font-bold text-neutral-500 uppercase tracking-widest border-b border-neutral-800 pb-2">Analysis Controls</h2>
            
            <div>
                <div class="flex justify-between text-[11px] text-cyan-400 mb-1 font-bold"><span>Clarity & Pattern Sharpness</span><span id="clVal">100%</span></div>
                <input type="range" id="clarity" min="0" max="300" value="100" class="w-full appearance-none bg-transparent">
            </div>

            <div>
                <div class="flex justify-between text-[11px] text-neutral-400 mb-1"><span>Highlights (Wet Gloss)</span><span id="hlVal">100%</span></div>
                <input type="range" id="highlights" min="0" max="200" value="100" class="w-full appearance-none bg-transparent">
            </div>

            <div>
                <div class="flex justify-between text-[11px] text-neutral-400 mb-1"><span>Cornea 3D Bulge (Intensity)</span><span id="cbVal">100%</span></div>
                <input type="range" id="corneaBulge" min="0" max="200" value="100" class="w-full appearance-none bg-transparent">
            </div>

            <div> 
                <div class="flex justify-between text-[11px] text-cyan-400 mb-1 font-bold"><span>Pupil Definition (Deepness)</span><span id="pdVal">50%</span></div>
                <input type="range" id="pupilFocus" min="0" max="100" value="50" class="w-full appearance-none bg-transparent">
            </div>

            <div class="opacity-60 pt-2 border-t border-neutral-800">
                <div class="flex justify-between text-[10px] text-neutral-500 mb-1"><span>Contrast Base</span><span id="cVal">120%</span></div>
                <input type="range" id="contrast" min="50" max="200" value="120" class="w-full appearance-none bg-transparent h-1">
            </div>

            <div class="opacity-60">
                <div class="flex justify-between text-[10px] text-neutral-500 mb-1"><span>Color Shade</span><span id="sVal">100%</span></div>
                <input type="range" id="saturation" min="0" max="200" value="100" class="w-full appearance-none bg-transparent h-1">
            </div>

            <div class="opacity-60 pb-3">
                <div class="flex justify-between text-[10px] text-neutral-500 mb-1"><span>Brightness</span><span id="bVal">100%</span></div>
                <input type="range" id="brightness" min="0" max="200" value="100" class="w-full appearance-none bg-transparent h-1">
            </div>

            <div class="pb-10 border-t border-neutral-800 pt-3">
                <div class="flex items-center justify-between text-[11px] text-neutral-400 mb-1">
                    <span>Auto-Rotation Lock</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="rotationLock" class="sr-only peer" checked>
                        <div class="w-9 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-cyan-500"></div>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, eyeMesh, frontLight, angledDetailLight;
        let baseImage = null; 
        const filterCanvas = document.createElement('canvas');
        const ctx = filterCanvas.getContext('2d', { willReadFrequently: true });
        let filteredTexture = null;

        // Editor Values
        let brightness = 100, contrast = 120, saturation = 100, corneaBulge = 100, pupilFocus = 50;
        let clarity = 100, highlights = 100; 
        let isRotating = true;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // Pure White Background
            
            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 7;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            
            // Bright Ambient to fill shadows, without causing black artifacts
            scene.add(new THREE.AmbientLight(0xffffff, 2.5)); 
            
            // New Lighting Strategy for Hyper Realism
            frontLight = new THREE.PointLight(0xffffff, 1.2);
            frontLight.position.set(0, 0, 5); 
            scene.add(frontLight);

            // Soft directional light slightly from side for defining tissue textures
            angledDetailLight = new THREE.DirectionalLight(0xffffff, 1.0);
            angledDetailLight.position.set(-3, 3, 5);
            angledDetailLight.target.position.set(0, 0, 0);
            scene.add(angledDetailLight);
            scene.add(angledDetailLight.target);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enablePan = false; controls.enableDamping = true;

            document.getElementById('loader').style.display = 'none';
            animate();
        }

        function processImageFile(file) {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').innerText = "Processing Details...";
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const maxSize = 1024;
                    let w = img.width, h = img.height;
                    if (w > maxSize || h > maxSize) {
                        const ratio = Math.min(maxSize / w, maxSize / h);
                        w *= ratio; h *= ratio;
                    }
                    filterCanvas.width = w; filterCanvas.height = h;
                    baseImage = img;
                    
                    document.getElementById('loader').style.display = 'none';
                    applyFilters(); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Handles Texture Updates & Extrem Clarity Engine
        function applyFilters() {
            if (!baseImage) return;
            const w = filterCanvas.width; const h = filterCanvas.height;
            
            // NEW: DUAL-STAGE SURGICAL CLARITY
            // We multiply the global contrast with the clarity slider. 
            // This makes the tissue details surgically defined.
            let baseContrast = contrast;
            let clarityScale = clarity / 100; // 0 to 3
            let totalContrast = baseContrast * clarityScale; 

            ctx.filter = `brightness(${brightness}%) contrast(${totalContrast}%) saturate(${saturation}%)`;
            ctx.drawImage(baseImage, 0, 0, w, h);
            
            // NEW Pupil Definition - Sharp Black Central Focus, no binary glare dots
            ctx.filter = 'none'; 
            const cx = w/2, cy = h/2, radius = Math.min(w, h)/2;
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
            
            let deepness = pupilFocus / 100;
            // Central surgical black (0 to 0.1radius)
            gradient.addColorStop(0, '#000000');
            gradient.addColorStop(0.1, '#000000'); 
            // Surgical defined border (0.1radius to 0.15radius)
            gradient.addColorStop(0.15, `rgba(0, 0, 0, 0.2)`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);

            if (!filteredTexture) {
                filteredTexture = new THREE.CanvasTexture(filterCanvas);
                // Ultra Resolution Clarity settings
                filteredTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
                filteredTexture.colorSpace = THREE.SRGBColorSpace;
                filteredTexture.minFilter = THREE.LinearFilter;
                create3DMesh(filteredTexture);
            } else {
                filteredTexture.needsUpdate = true; // Slider logic zinda karein
                update3DMaterial(); // Update bumps dynamically
            }
        }

        function updateMeshGeometry() {
            if (!eyeMesh) return;
            const pos = eyeMesh.geometry.attributes.position;
            const bulgeVal = corneaBulge / 100;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i);
                // Gaussian Curve adjusted by Cornea Bulge slider
                const z = (0.7 * bulgeVal) * Math.exp(-(x*x + y*y) / 4.0);
                pos.setZ(i, z);
            }
            eyeMesh.geometry.computeVertexNormals();
            pos.needsUpdate = true; 
        }

        // NEW FIX: Updates 3D Bumps instantly
        function update3DMaterial() {
            if (!eyeMesh) return;
            // Clarity now controls the height of the 3D veins/threads
            eyeMesh.material.bumpScale = (clarity / 100) * 0.1; // Iris pop intensity
            
            // Highlights controls how glossy and wet the eye looks
            // Roughness 0 = wet gloss mirror, Roughness 1 = matte
            eyeMesh.material.roughness = Math.max(0.01, 1.0 - (highlights / 100)); 
            eyeMesh.material.needsUpdate = true;
        }

        function create3DMesh(tex) {
            if (eyeMesh) scene.remove(eyeMesh);
            // Size as requested (2.8 x 2.0)
            const geo = new THREE.PlaneGeometry(2.8, 2.0, 256, 256);
            
            // Ultra-Real Forensic Material (Combined Map & BumpMap)
            const mat = new THREE.MeshStandardMaterial({ 
                map: tex, 
                bumpMap: tex, 
                bumpScale: (clarity / 100) * 0.1, // Forensic Texture Pop
                roughness: Math.max(0.01, 1.0 - (highlights / 100)), 
                metalness: 0.0,
                side: THREE.DoubleSide 
            });
            eyeMesh = new THREE.Mesh(geo, mat);
            updateMeshGeometry(); 
            scene.add(eyeMesh);
        }

        const triggerUpdate = (type = 'canvas') => {
            const s = document.getElementById('saveStatus');
            s.style.opacity = 1; setTimeout(()=> s.style.opacity=0, 300);
            
            if (type === 'geometry') { updateMeshGeometry(); } 
            else if (type === 'material') { update3DMaterial(); }
            else { applyFilters(); } // Refresh canvas (brightness, contrast, pupil)
        };

        // Event Listeners
        document.getElementById('clarity').addEventListener('input', (e) => {
            clarity = e.target.value; document.getElementById('clVal').innerText = clarity+'%'; 
            triggerUpdate(); // We need to update contrast (canvas) AND bump depth (material)
        });
        document.getElementById('highlights').addEventListener('input', (e) => {
            highlights = e.target.value; document.getElementById('hlVal').innerText = highlights+'%'; triggerUpdate('material');
        });
        document.getElementById('contrast').addEventListener('input', (e) => {
            contrast = e.target.value; document.getElementById('cVal').innerText = contrast+'%'; triggerUpdate();
        });
        document.getElementById('saturation').addEventListener('input', (e) => {
            saturation = e.target.value; document.getElementById('sVal').innerText = saturation+'%'; triggerUpdate();
        });
        document.getElementById('brightness').addEventListener('input', (e) => {
            brightness = e.target.value; document.getElementById('bVal').innerText = brightness+'%'; triggerUpdate();
        });
        document.getElementById('corneaBulge').addEventListener('input', (e) => {
            corneaBulge = e.target.value; document.getElementById('cbVal').innerText = corneaBulge+'%'; triggerUpdate('geometry');
        });
        document.getElementById('pupilFocus').addEventListener('input', (e) => {
            pupilFocus = e.target.value; document.getElementById('pdVal').innerText = pupilFocus+'%'; triggerUpdate();
        });
        
        document.getElementById('rotationLock').addEventListener('change', (e) => {
            isRotating = e.target.checked;
        });

        document.getElementById('imageInput').addEventListener('change', (e) => {
            if (e.target.files[0]) processImageFile(e.target.files[0]);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (eyeMesh && isRotating) {
                eyeMesh.rotation.y = Math.sin(Date.now() * 0.0008) * 0.03;
            }
            controls.update();
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
