<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sadiya's 3D Eye Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body class="bg-black text-white flex flex-col h-screen overflow-hidden font-sans">
    
    <header class="p-4 border-b border-neutral-800 bg-neutral-900 flex items-center justify-between z-10">
        <h1 class="font-bold text-cyan-500 uppercase tracking-widest text-sm">3D Eye Generator Pro</h1>
        <span class="text-[10px] text-neutral-500">Auto-Sharpening ON</span>
    </header>

    <div id="canvas-container" class="relative w-full flex-1 bg-white">
        <div id="loader" class="absolute inset-0 flex items-center justify-center bg-white z-20 text-cyan-600 font-bold text-sm uppercase tracking-widest" style="display: none;">
            Generating 3D Eye... 👁️
        </div>
        <div id="startMsg" class="absolute inset-0 flex items-center justify-center bg-white z-10 text-neutral-400 font-bold text-sm uppercase">
            Upload an image to start
        </div>
    </div>

    <div class="p-6 bg-neutral-900 rounded-t-3xl border-t border-neutral-800 shadow-2xl z-10">
        
        <input type="file" id="imageInput" accept=".jpg, .jpeg, .png" class="hidden">
        
        <div class="flex flex-col gap-3">
            <button onclick="document.getElementById('imageInput').click()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl font-bold active:scale-95 transition-all uppercase tracking-wider text-sm shadow-lg shadow-cyan-500/20">
                📂 Upload Iris Image
            </button>

            <button id="downloadBtn" style="display: none;" class="w-full py-4 bg-transparent border-2 border-green-500 text-green-500 hover:bg-green-500 hover:text-white rounded-xl font-bold active:scale-95 transition-all uppercase tracking-wider text-sm">
                📸 Download as JPEG
            </button>
        </div>
        
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, eyeMesh;
        const container = document.getElementById('canvas-container');
        const downloadBtn = document.getElementById('downloadBtn');
        const startMsg = document.getElementById('startMsg');
        
        const filterCanvas = document.createElement('canvas');
        const ctx = filterCanvas.getContext('2d', { willReadFrequently: true });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // White Background
            
            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 7;

            // FIX: preserveDrawingBuffer must be true to allow JPEG download from WebGL
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            container.appendChild(renderer.domElement);

            // Bright, even lighting so there are no black shadows
            scene.add(new THREE.AmbientLight(0xffffff, 2.5));
            const pointLight = new THREE.PointLight(0xffffff, 1.2);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;
            controls.enableDamping = true; 

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function processImageFile(file) {
            document.getElementById('loader').style.display = 'flex';
            startMsg.style.display = 'none';
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const maxSize = 1024;
                    let w = img.width, h = img.height;
                    if (w > maxSize || h > maxSize) {
                        const ratio = Math.min(maxSize / w, maxSize / h);
                        w *= ratio; h *= ratio;
                    }
                    filterCanvas.width = w; filterCanvas.height = h;
                    
                    // Auto-Enhancement Logic (Bypass UI sliders, do it automatically)
                    ctx.filter = `brightness(100%) contrast(150%) saturate(100%)`; // Auto-sharpness
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    // Auto-Pupil (Perfect black center)
                    ctx.filter = 'none'; 
                    const cx = w/2, cy = h/2, radius = Math.min(w, h)/2;
                    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
                    gradient.addColorStop(0, '#000000');
                    gradient.addColorStop(0.1, '#000000'); 
                    gradient.addColorStop(0.15, `rgba(0, 0, 0, 0.4)`);
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, w, h);

                    create3DMesh(new THREE.CanvasTexture(filterCanvas));
                    document.getElementById('loader').style.display = 'none';
                    downloadBtn.style.display = 'block'; // Show download button
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function create3DMesh(tex) {
            if (eyeMesh) scene.remove(eyeMesh);
            
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.minFilter = THREE.LinearFilter;

            const geo = new THREE.PlaneGeometry(2.8, 2.0, 256, 256);
            const pos = geo.attributes.position;
            
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i);
                // Auto 3D Bulge
                const z = 0.7 * Math.exp(-(x*x + y*y) / 4.0);
                pos.setZ(i, z);
            }
            geo.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({ 
                map: tex, 
                bumpMap: tex,
                bumpScale: 0.1, // Auto Pop-out
                roughness: 0.2, // Auto Glossy
                side: THREE.DoubleSide 
            });
            
            eyeMesh = new THREE.Mesh(geo, mat);
            scene.add(eyeMesh);
        }

        // Image Upload Event
        document.getElementById('imageInput').addEventListener('change', (e) => {
            if (e.target.files[0]) processImageFile(e.target.files[0]);
        });

        // Download JPEG Event
        downloadBtn.addEventListener('click', () => {
            renderer.render(scene, camera); // Ensure scene is fully painted
            const dataURL = renderer.domElement.toDataURL("image/jpeg", 1.0);
            const link = document.createElement('a');
            link.download = 'Sadiya_3D_Eye_' + Date.now() + '.jpg';
            link.href = dataURL;
            link.click();
        });

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (eyeMesh) {
                eyeMesh.rotation.y = Math.sin(Date.now() * 0.0008) * 0.03;
            }
            controls.update();
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
