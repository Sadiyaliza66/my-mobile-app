<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Eye Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body class="m-0 overflow-hidden bg-white">

    <div class="absolute top-5 left-1/2 -translate-x-1/2 z-10 flex flex-col gap-3 w-11/12 max-w-sm">
        <input type="file" id="upload" accept="image/*" class="hidden">
        <button onclick="document.getElementById('upload').click()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg w-full">
            UPLOAD EYE IMAGE
        </button>
        <button id="download" class="hidden bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg w-full">
            SAVE AS JPEG
        </button>
    </div>

    <div id="canvas-container" class="w-screen h-screen"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, eyeMesh, controls;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // Pure white background

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 6;

            // preserveDrawingBuffer zaroori hai photo save karne ke liye
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Sirf ek bright Ambient Light, koi Directional Light nahi = NO SHADOWS
            scene.add(new THREE.AmbientLight(0xffffff, 3.0));

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;

            animate();
        }

        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    
                    // Simple drawing without extra filters
                    ctx.drawImage(img, 0, 0);

                    // Add proper black pupil
                    const cx = img.width/2, cy = img.height/2, r = Math.min(img.width, img.height)/2;
                    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                    grad.addColorStop(0, '#000000');
                    grad.addColorStop(0.12, '#000000');
                    grad.addColorStop(0.18, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, img.width, img.height);

                    const tex = new THREE.CanvasTexture(canvas);
                    tex.colorSpace = THREE.SRGBColorSpace;
                    
                    createMesh(tex);
                    document.getElementById('download').classList.remove('hidden'); // Show download button
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function createMesh(tex) {
            if (eyeMesh) scene.remove(eyeMesh);

            const geo = new THREE.PlaneGeometry(3.0, 2.2, 128, 128);
            const pos = geo.attributes.position;
            
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i);
                // Simple 3D Bulge for Cornea
                pos.setZ(i, 0.8 * Math.exp(-(x*x + y*y) / 3.0));
            }
            geo.computeVertexNormals();

            // Simple material
            const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.3, side: THREE.DoubleSide });
            eyeMesh = new THREE.Mesh(geo, mat);
            scene.add(eyeMesh);
        }

        document.getElementById('download').addEventListener('click', () => {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = '3D_Eye.jpg';
            link.href = renderer.domElement.toDataURL("image/jpeg", 1.0);
            link.click();
        });

        function animate() {
            requestAnimationFrame(animate);
            if (eyeMesh) eyeMesh.rotation.y = Math.sin(Date.now() * 0.001) * 0.05; // Auto rotate
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
