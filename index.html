<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Eye Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body class="m-0 overflow-hidden bg-white">

    <div class="absolute top-5 left-1/2 -translate-x-1/2 z-10 flex flex-col gap-3 w-11/12 max-w-sm">
        <input type="file" id="upload" accept="image/*" class="hidden">
        <button onclick="document.getElementById('upload').click()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg w-full uppercase">
            Upload Eye Image
        </button>
        <button id="download" class="hidden bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg w-full uppercase">
            Save As JPEG
        </button>
    </div>

    <div id="canvas-container" class="w-screen h-screen"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, eyeMesh, controls;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // Pure white background

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Only Ambient Light to prevent any dark shadows
            scene.add(new THREE.AmbientLight(0xffffff, 3.0));

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;

            animate();
        }

        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const textureLoader = new THREE.TextureLoader();
                // Load the exact image without adding any black dots
                textureLoader.load(event.target.result, (tex) => {
                    tex.colorSpace = THREE.SRGBColorSpace;
                    createMesh(tex);
                    document.getElementById('download').classList.remove('hidden');
                });
            };
            reader.readAsDataURL(file);
        });

        function createMesh(tex) {
            if (eyeMesh) scene.remove(eyeMesh);

            const geo = new THREE.PlaneGeometry(3.0, 2.2, 128, 128);
            const pos = geo.attributes.position;
            
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i);
                // 3D bulge shape
                pos.setZ(i, 0.8 * Math.exp(-(x*x + y*y) / 3.0));
            }
            geo.computeVertexNormals();

            // MeshBasicMaterial creates ZERO shadows. It just shows your image perfectly.
            const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
            eyeMesh = new THREE.Mesh(geo, mat);
            scene.add(eyeMesh);
        }

        document.getElementById('download').addEventListener('click', () => {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = '3D_Eye.jpg';
            link.href = renderer.domElement.toDataURL("image/jpeg", 1.0);
            link.click();
        });

        function animate() {
            requestAnimationFrame(animate);
            if (eyeMesh) eyeMesh.rotation.y = Math.sin(Date.now() * 0.001) * 0.05; // Auto rotate
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
